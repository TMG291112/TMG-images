<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Imágenes IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #7b5cfa;
      --accent2: #c084fc;
      --text: #f0eeff;
      --muted: #7a7890;
      --success: #22d3a5;
      --error: #f87171;
    }
 
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    /* Fondo con patrón de puntos */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(123,92,250,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }
 
    header {
      width: 100%;
      max-width: 820px;
      padding: 3rem 2rem 0;
      position: relative;
      z-index: 1;
    }
 
    .badge {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(192, 132, 252, 0.1);
      border: 1px solid rgba(192, 132, 252, 0.2);
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
 
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f0eeff 0%, #c084fc 50%, #7b5cfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.75rem;
    }
 
    header p {
      font-size: 15px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }
 
    main {
      width: 100%;
      max-width: 820px;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }
 
    /* Panel de entrada */
    .input-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
 
    .input-panel:focus-within {
      border-color: rgba(123,92,250,0.4);
    }
 
    .input-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: block;
    }
 
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.6;
      resize: none;
      min-height: 90px;
    }
 
    textarea::placeholder {
      color: var(--muted);
      font-weight: 300;
      font-style: italic;
    }
 
    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
 
    .char-count {
      font-size: 12px;
      color: var(--muted);
    }
 
    .btn-generate {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 10px 22px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
 
    .btn-generate:hover:not(:disabled) {
      background: #6a4de0;
    }
 
    .btn-generate:active:not(:disabled) {
      transform: scale(0.97);
    }
 
    .btn-generate:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
 
    /* Sugerencias rápidas */
    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
 
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
 
    .chip:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
 
    /* Panel de resultado */
    .result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: none;
    }
 
    .result-panel.visible { display: block; }
 
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }
 
    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }
 
    .btn-download {
      display: flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
    }
 
    .btn-download:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
 
    .result-image-wrapper {
      position: relative;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .result-image-wrapper img {
      width: 100%;
      display: block;
      max-height: 600px;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
 
    .result-image-wrapper img.loaded { opacity: 1; }
 
    /* Estado de carga */
    .loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 3rem;
      min-height: 300px;
    }
 
    .loading-state.visible { display: flex; }
 
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
 
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .loading-text {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }
 
    /* Estado de error */
    .error-msg {
      display: none;
      margin-top: 1rem;
      padding: 12px 16px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 12px;
      font-size: 14px;
      color: var(--error);
    }
 
    .error-msg.visible { display: block; }
 
    /* Prompt mostrado bajo imagen */
    .result-prompt {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
      line-height: 1.5;
    }
 
    footer {
      padding: 2rem;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      position: relative;
      z-index: 1;
    }
 
    /* Ícono SVG pequeño */
    .icon { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: -3px; }
  </style>
</head>
<body>
 
  <header>
    <span class="badge">✦ Powered by Pollinations AI</span>
    <h1>TMG images</h1>
    <p>Describe lo que imaginas y la IA lo convierte en una imagen en segundos.</p>
  </header>
 
  <main>
 
    <!-- Sugerencias rápidas -->
    <div class="suggestions">
      <button class="chip" onclick="setPrompt(this)">Arthur Morgan, Red Dead Redemption 2</button>
      <button class="chip" onclick="setPrompt(this)">Ciudad cyberpunk bajo la lluvia</button>
      <button class="chip" onclick="setPrompt(this)">Dragón volando sobre montañas</button>
      <button class="chip" onclick="setPrompt(this)">Astronauta en un bosque mágico</button>
      <button class="chip" onclick="setPrompt(this)">Samurái al atardecer, estilo anime</button>
    </div>
 
    <!-- Panel de entrada -->
    <div class="input-panel">
      <label class="input-label" for="prompt">Tu descripción</label>
      <textarea
        id="prompt"
        placeholder="ej: Arthur Morgan de Red Dead Redemption 2, luz dramática, estilo cinematográfico..."
        maxlength="500"
        oninput="updateCount()"
      ></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="count">0</span> / 500</span>
        <button class="btn-generate" id="btn" onclick="generateImage()">
          <svg class="icon" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Generar imagen
        </button>
      </div>
    </div>
 
    <!-- Error -->
    <div class="error-msg" id="error"></div>
 
    <!-- Resultado -->
    <div class="result-panel" id="result">
      <div class="result-header">
        <span class="result-title">Imagen generada</span>
        <a class="btn-download" id="download-link" href="#" download="imagen-ia.png" target="_blank">
          <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar
        </a>
      </div>
 
      <!-- Cargando -->
      <div class="loading-state" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">Generando tu imagen…</p>
      </div>
 
      <!-- Imagen -->
      <div class="result-image-wrapper" id="image-wrapper" style="display:none;">
        <img id="result-img" src="" alt="Imagen generada" />
      </div>
 
      <div class="result-prompt" id="result-prompt"></div>
    </div>
 
  </main>
 
  <footer>Imágenes generadas con <a href="https://pollinations.ai" style="color:var(--accent2);text-decoration:none;">Pollinations.ai</a> · Gratis y sin cuenta</footer>
 
  <script>
    function updateCount() {
      const ta = document.getElementById('prompt');
      document.getElementById('count').textContent = ta.value.length;
    }
 
    function setPrompt(btn) {
      document.getElementById('prompt').value = btn.textContent;
      updateCount();
      document.getElementById('prompt').focus();
    }
 
    async function generateImage() {
      const prompt = document.getElementById('prompt').value.trim();
      const btn = document.getElementById('btn');
      const error = document.getElementById('error');
      const result = document.getElementById('result');
      const loading = document.getElementById('loading');
      const imageWrapper = document.getElementById('image-wrapper');
      const img = document.getElementById('result-img');
      const downloadLink = document.getElementById('download-link');
      const resultPrompt = document.getElementById('result-prompt');
 
      if (!prompt) {
        showError('Por favor escribe una descripción antes de generar.');
        return;
      }
 
      // Reset
      error.classList.remove('visible');
      error.textContent = '';
      img.classList.remove('loaded');
      imageWrapper.style.display = 'none';
      loading.classList.add('visible');
      result.classList.add('visible');
      btn.disabled = true;
      btn.innerHTML = `<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div> Generando…`;
 
      try {
        const res = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
 
        const data = await res.json();
 
        if (!res.ok) {
          throw new Error(data.error || 'Error desconocido');
        }
 
        // Cargar imagen
        const tempImg = new Image();
        tempImg.onload = () => {
          img.src = data.image_url;
          downloadLink.href = data.image_url;
          resultPrompt.textContent = `"${prompt}"`;
          loading.classList.remove('visible');
          imageWrapper.style.display = 'flex';
          setTimeout(() => img.classList.add('loaded'), 50);
        };
        tempImg.onerror = () => {
          throw new Error('No se pudo cargar la imagen generada.');
        };
        tempImg.src = data.image_url;
 
      } catch (err) {
        loading.classList.remove('visible');
        result.classList.remove('visible');
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generar imagen`;
      }
    }
 
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = '⚠ ' + msg;
      el.classList.add('visible');
    }
 
    // Enter para generar (Shift+Enter para nueva línea)
    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        generateImage();
      }
    });
  </script>
 
</body>
</html>
