<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai image generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent2: #f76a8a;
            --text: #e8e8f0;
            --muted: #6b6b80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            background-image:
                radial-gradient(ellipse 60% 40% at 70% 10%, rgba(124,106,247,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 20% 80%, rgba(247,106,138,0.08) 0%, transparent 50%);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 70%, var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        header p {
            color: var(--muted);
            margin-top: 0.5rem;
            font-size: 1rem;
            font-weight: 300;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 0 60px rgba(124,106,247,0.07);
        }

        label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
            outline: none;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea::placeholder { color: var(--muted); }

        button[type="submit"] {
            margin-top: 1.2rem;
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: opacity 0.2s, transform 0.1s;
        }

        button[type="submit"]:hover { opacity: 0.9; }
        button[type="submit"]:active { transform: scale(0.98); }

        button[type="submit"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 2rem;
            text-align: center;
        }

        .result img {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .prompt-label {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: var(--muted);
            font-style: italic;
        }

        .error {
            background: rgba(247,106,138,0.1);
            border: 1px solid rgba(247,106,138,0.3);
            border-radius: 12px;
            padding: 1rem;
            color: var(--accent2);
            font-size: 0.9rem;
            margin-top: 1.5rem;
        }

        .loading {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.8rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .download-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.4rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .download-btn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>TMG images</h1>
    <p>Made by Milo291112</p>
</header>

<div class="card">
    <form method="POST" id="form">
        <label for="prompt_usuario">Describe your image</label>
        <textarea
            id="prompt_usuario"
            name="prompt_usuario"
            placeholder="Ask what image you want to make "
        >{{ prompt }}</textarea>

        <button type="submit" id="btn">✦ Generate image</button>
    </form>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        generateing image please wait a moment...
    
    </div>

    {% if error %}
    <div class="error">⚠ {{ error }}</div>
    {% endif %}

    {% if imagen %}
    <div class="result">
        <img src="data:image/png;base64,{{ imagen }}" alt="Imagen generada">
        <p class="prompt-label">"{{ prompt }}"</p>
        <a class="download-btn" href="data:image/png;base64,{{ imagen }}" download="imagen_ia.png">↓ Download</a>
    </div>
    {% endif %}
</div>

<script>
    document.getElementById("form").addEventListener("submit", function() {
        document.getElementById("btn").disabled = true;
        document.getElementById("btn").textContent = "Generando...";
        document.getElementById("loading").style.display = "block";
    });
</script>

</body>
</html>
